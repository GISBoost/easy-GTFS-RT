name: Łódź — record chunk 3

on:
  schedule:
    # Europe/Warsaw local window 13:30-18:30. CRITICAL CHUNK — starts 30 min before the
    # afternoon peak (14:00-18:00) as a buffer against GitHub Actions' own start delay
    # (observed: chunk4 started ~45 min late on 2026-07-11, more than the previous 30-min
    # buffer this chunk had). Combined with chunk 2 (which records until 14:30), the
    # effective delay tolerance before the 14:00 peak start would have a gap is now ~60
    # min. Duration extended to 300 min (vs the other chunks' 270) to keep the same
    # 18:30 end / post-peak margin despite the earlier start. CEST (summer, UTC+2) —
    # current offset as of 2026-07. CET (winter, UTC+1) equivalent: "30 12 * * *". DST is
    # NOT auto-compensated (no sleep-align step) — this cron must be edited by hand after
    # each DST switch (last Sunday of March/October). Deliberately out of scope for FA-7 —
    # see PR_easy-OTP_v07.md, section FA-7, "Ograniczenia", and this repo's CLAUDE.md.
    - cron: "30 11 * * *"
  workflow_dispatch: {}

jobs:
  record:
    runs-on: ubuntu-latest
    # Safety margin under GitHub's own 360-minute (6h) hard cap per job.
    timeout-minutes: 340
    steps:
      - name: Checkout this repo (workflow + eventual artifact context)
        uses: actions/checkout@v4

      - name: Checkout easy-OTP (source of the family_a CLI, read-only)
        uses: actions/checkout@v4
        with:
          repository: GISBoost/easy-OTP
          path: easy-otp-src
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compute today's local (Europe/Warsaw) date
        id: date
        run: echo "date=$(TZ=Europe/Warsaw date +%F)" >> "$GITHUB_OUTPUT"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('easy-otp-src/tools/family_a_reconstruction/requirements.txt') }}

      - name: Install dependencies
        working-directory: easy-otp-src/tools/family_a_reconstruction
        run: pip install -r requirements.txt

      - name: Record chunk 3
        working-directory: easy-otp-src/tools/family_a_reconstruction
        run: |
          python -m family_a.cli record \
            --url "${{ vars.LODZ_VEHICLE_POSITIONS_URL }}" \
            --out-dir "../../../positions_${{ steps.date.outputs.date }}_chunk3" \
            --duration-min 300 \
            --interval-sec 60

      - name: Upload recorded snapshots as artifact
        uses: actions/upload-artifact@v4
        with:
          name: positions-${{ steps.date.outputs.date }}-chunk3
          path: positions_${{ steps.date.outputs.date }}_chunk3
          retention-days: 2
