name: Łódź — build (phone)

on:
  # Primary trigger (TX-7): sweep_and_upload.sh (Termux, TX-3) fires this event via a plain
  # `curl -X POST .../dispatches` call immediately after it finishes uploading today's raw
  # recordings, so the build starts within seconds instead of waiting for the schedule below.
  repository_dispatch:
    types: [phone-sweep-complete]

  # Fallback safety net, kept deliberately even though repository_dispatch is now primary: covers
  # the case where the phone's dispatch call itself fails (network hiccup right after upload, an
  # expired GH_TOKEN - which also silently disables the dispatch call, not just the upload).
  # Safe to keep alongside the primary trigger: `concurrency:` below (`cancel-in-progress: false`)
  # serializes every trigger of this same workflow regardless of type, so a same-day dispatch run
  # and a stray schedule run never race - whichever finishes second just finds today's release
  # already published (the idempotency guard below) and exits as a fast no-op, no duplicate
  # WhatsApp message.
  #
  # This reintroduces the same class of risk `family_a_build_and_notify.yml` (FA-8) deliberately
  # dropped its own 23:45 schedule fallback for on 2026-07-13 (Michał decision, see that file's
  # history): a delayed scheduled run whose `TZ=Europe/Warsaw date +%F` rolls past local midnight
  # resolves to *tomorrow's* date and fails on "no release found yet" for a day that hasn't
  # recorded. FA-8 could simply drop its fallback because it has `workflow_run` as a reliable
  # primary trigger instead; this workflow's own primary trigger is now repository_dispatch above,
  # which doesn't have this midnight-rollover risk (it fires within seconds of upload, and reads
  # the date from the phone's own payload, not the runner's clock) - so this schedule only matters
  # as a rarely-exercised fallback. Also mitigated by the `workflow_dispatch` date override below
  # for manual recovery, and by TX-6 (separate milestone) monitoring for a missing release.
  schedule:
    - cron: "15 20 * * *"   # 22:15 CEST (summer, UTC+2). GitHub Actions cron has no DST
                            # awareness, so this needs a manual flip to "15 21 * * *" (22:15 CET,
                            # winter, UTC+1) when Europe/Warsaw switches off summer time, and back
                            # again in spring — 21:15 UTC (the previous value here) is 23:15 CEST,
                            # not 22:15, which was a real off-by-one-hour bug caught in review.
  workflow_dispatch:
    inputs:
      date:
        description: >-
          Override RECORDING_DATE (YYYY-MM-DD) for a manual run — leave empty to use today's
          Europe/Warsaw date. Useful when testing after local midnight has rolled over past the
          day whose recordings you actually want to build.
        required: false
        default: ""

concurrency:
  # Own group, not shared with FA-8's `family-a-build-and-notify` — the two tracks publish to
  # distinct tags and have no shared idempotency risk to serialize against.
  group: family-a-build-and-notify-phone
  cancel-in-progress: false

jobs:
  build_and_notify:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write   # required for `gh release create`/`gh release download` in this repo
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Checkout easy-OTP (source of the family_a CLI, read-only)
        uses: actions/checkout@v4
        with:
          repository: GISBoost/easy-OTP
          path: easy-otp-src
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compute today's local (Europe/Warsaw) date
        id: date
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            # Use the phone's own $DATE (computed at upload time) as authoritative instead of
            # re-deriving "today" a second time on a different machine moments later - the same
            # class of hardening this project has repeatedly needed elsewhere (see the schedule
            # comment above, and fix/tx4-cron-dst-offset).
            PAYLOAD_DATE="${{ github.event.client_payload.date }}"
            if [ -n "$PAYLOAD_DATE" ]; then
              echo "date=$PAYLOAD_DATE" >> "$GITHUB_OUTPUT"
            else
              echo "::notice::repository_dispatch fired without client_payload.date - falling back to runner's local date"
              echo "date=$(TZ=Europe/Warsaw date +%F)" >> "$GITHUB_OUTPUT"
            fi
          else
            OVERRIDE="${{ github.event.inputs.date }}"
            if [ -n "$OVERRIDE" ]; then
              echo "date=$OVERRIDE" >> "$GITHUB_OUTPUT"
            else
              echo "date=$(TZ=Europe/Warsaw date +%F)" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Check for an existing release (idempotency guard)
        id: existing_release
        run: |
          set -euo pipefail
          TAG="lodz-realized-${{ steps.date.outputs.date }}-phone"
          if gh release view "$TAG" >/dev/null 2>err.log; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release $TAG already exists - this day was already built (likely by an earlier manual run); skipping the rest of this run."
          elif grep -qi "not found" err.log; then
            echo "exists=false" >> "$GITHUB_OUTPUT"
          else
            # Anything other than a plain "not found" (auth, rate limit, transient API error) is
            # NOT safe to treat as "release doesn't exist" - doing so could still hit a
            # duplicate-tag conflict later in Publish if the release actually does exist. Fail
            # loudly here instead, so the real cause shows up in the log and triggers the
            # failure notification, rather than a confusing error several steps downstream.
            echo "::error::gh release view failed unexpectedly (not a plain \"not found\") - refusing to assume the release doesn't exist. Raw error follows:"
            cat err.log >&2
            exit 1
          fi

      - name: Cache pip dependencies
        if: steps.existing_release.outputs.exists != 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('easy-otp-src/tools/family_a_reconstruction/requirements.txt') }}

      - name: Install dependencies
        if: steps.existing_release.outputs.exists != 'true'
        working-directory: easy-otp-src/tools/family_a_reconstruction
        run: pip install -r requirements.txt

      - name: Download fresh static GTFS
        if: steps.existing_release.outputs.exists != 'true'
        run: curl -fsSL -o static_gtfs.zip "${{ vars.LODZ_STATIC_GTFS_URL }}"

      - name: Download today's raw recordings from the phone's release
        id: collect
        if: steps.existing_release.outputs.exists != 'true'
        run: |
          set -euo pipefail
          DATE="${{ steps.date.outputs.date }}"
          TAG="positions-raw-${DATE}"
          mkdir -p raw
          gh release download "$TAG" --dir raw --pattern "*.zip" \
            || { echo "::error::No raw-data release found for tag ${TAG} - did TX-3's sweep run on the phone today?"; exit 1; }

          DIRS=()
          for ZIP in raw/*.zip; do
            [ -f "$ZIP" ] || continue
            NAME="$(basename "$ZIP" .zip)"
            # sweep_and_upload.sh (TX-3) zips each directory as
            # `zip -rq "$ZIP_NAME" "$(basename "$DIR")"`, so the zip's internal paths already
            # start with "${NAME}/..." - extracting to "raw" (not "raw/${NAME}") lets that
            # existing top-level entry land at "raw/${NAME}/...". Extracting to "raw/${NAME}"
            # instead would double-nest it as "raw/${NAME}/${NAME}/...", which is exactly what
            # caused `match` to report "No snapshot_*.pb files found" on 2026-07-13.
            unzip -q "$ZIP" -d "raw"
            DIRS+=("raw/${NAME}")
          done

          if [ "${#DIRS[@]}" -eq 0 ]; then
            echo "::error::Release ${TAG} exists but has no .zip assets"
            exit 1
          fi

          echo "count=${#DIRS[@]}" >> "$GITHUB_OUTPUT"
          # Space-separated list, consumed word-split by `match` below - safe here since TX-3's
          # zip names (positions_<date>_<time>) never contain spaces.
          echo "dirs=${DIRS[*]}" >> "$GITHUB_OUTPUT"
          echo "Found ${#DIRS[@]} recording director$( [ "${#DIRS[@]}" -eq 1 ] && echo y || echo ies ) from the phone for ${DATE}"

      - name: Compute actual recorded time coverage
        id: coverage
        if: steps.existing_release.outputs.exists != 'true'
        run: |
          set -euo pipefail
          python3 - ${{ steps.collect.outputs.dirs }} >> "$GITHUB_OUTPUT" <<'PYEOF'
          # Merges each recording directory's actual (not nominal/scheduled) start/stop into
          # contiguous ranges, so a restart gap (self-healing supervised recording, TX-2) shows up
          # as a visible gap instead of being silently assumed away.
          #
          # Unlike FA-8's version of this step (which runs on GitHub-hosted runners, always UTC,
          # and re-tags naive timestamps as UTC before converting to Warsaw), the phone's system
          # clock is confirmed to already be Europe/Warsaw local - recorder.py's
          # `datetime.now().isoformat()` is invoked with no TZ override around the Python process
          # itself (only the surrounding shell's `date` calls in record_supervised.sh force
          # TZ=Europe/Warsaw). Re-tagging these already-local timestamps as UTC and converting
          # again would double-shift them. Do not "fix" this to match FA-8's version.
          import json
          import sys
          from pathlib import Path
          from datetime import datetime

          def parse_snapshot_name(name):
              # Deliberate inline duplicate of family_a.recorder.parse_snapshot_filename - this
              # script runs standalone from the repo root (no working-directory change into
              # family_a_reconstruction, to avoid extra relative-path juggling on top of the
              # raw/<dir> paths the collect step already produces). Same precedent as family_a
              # itself deliberately duplicating RT-2's recorder rather than importing it (see
              # that module's docstring) - keep this in sync by hand if the snapshot filename
              # format (snapshot_YYYYmmdd-HHMMSS.pb) ever changes.
              stem = name[:-3] if name.endswith(".pb") else name
              prefix = "snapshot_"
              if not stem.startswith(prefix):
                  return None
              try:
                  return datetime.strptime(stem[len(prefix):], "%Y%m%d-%H%M%S")
              except ValueError:
                  return None

          intervals = []
          for d in sys.argv[1:]:
              directory = Path(d)
              manifest = directory / "recording.json"
              if manifest.exists():
                  data = json.loads(manifest.read_text())
                  start = datetime.fromisoformat(data["started_at"])
                  stop = datetime.fromisoformat(data["stopped_at"])
              else:
                  # recording.json is only written from a `finally:` block in family_a.cli's
                  # `record` command - a SIGKILL (Android/runit killing the process, exactly the
                  # scenario TX-2's self-healing loop exists to recover from) skips it entirely,
                  # even though the snapshot_*.pb files polled before the kill are still on disk
                  # and still valid input to `match`. Fall back to those filenames' own embedded
                  # timestamps instead of losing this directory's time range altogether.
                  timestamps = sorted(
                      dt for dt in (parse_snapshot_name(p.name) for p in directory.glob("snapshot_*.pb"))
                      if dt is not None
                  )
                  if not timestamps:
                      print(f"::warning::no recording.json and no parseable snapshot_*.pb filenames in {d}, excluded from coverage summary", file=sys.stderr)
                      continue
                  print(f"::notice::no recording.json in {d} (likely killed mid-recording) - coverage derived from {len(timestamps)} snapshot filenames instead", file=sys.stderr)
                  start, stop = timestamps[0], timestamps[-1]
              intervals.append((start, stop))

          intervals.sort()
          merged = []
          for start, stop in intervals:
              if merged and start <= merged[-1][1]:
                  merged[-1] = (merged[-1][0], max(merged[-1][1], stop))
              else:
                  merged.append((start, stop))

          ranges = ", ".join(f"{s:%H:%M}-{e:%H:%M}" for s, e in merged) if merged else "unknown"
          print(f"coverage={ranges}")
          PYEOF

      - name: Match
        id: match
        if: steps.existing_release.outputs.exists != 'true'
        working-directory: easy-otp-src/tools/family_a_reconstruction
        run: |
          set -euo pipefail
          args=()
          for d in ${{ steps.collect.outputs.dirs }}; do
            args+=(--positions-dir "../../../${d}")
          done
          python -m family_a.cli match \
            "${args[@]}" \
            --static "../../../static_gtfs.zip" \
            --out "matched_${{ steps.date.outputs.date }}.csv" \
            | tee "../../../match_output.log"

          # FA-8 spec requires a failure notification (not a silent "success") when match finds
          # zero observations - e.g. the static GTFS was republished mid-recording and every
          # trip_id now resolves as unknown_shape (see FA-6 README's "Recording across multiple
          # days" note). Without this check, `match`/`build` both exit 0 on an empty table and a
          # misleadingly cheerful "ready" message would still go out.
          MATCHED=$(grep '^Observations matched:' "../../../match_output.log" | grep -oE '[0-9]+' || echo 0)
          echo "matched_count=${MATCHED:-0}" >> "$GITHUB_OUTPUT"
          if [ "${MATCHED:-0}" -eq 0 ]; then
            echo "::error::match produced zero observations - matched.csv is effectively empty (check the reject-count breakdown above; a republished static GTFS with a shifted trip_id generation mid-recording is a known cause)"
            exit 1
          fi

      - name: Build
        id: build
        if: steps.existing_release.outputs.exists != 'true'
        working-directory: easy-otp-src/tools/family_a_reconstruction
        run: |
          set -euo pipefail
          python -m family_a.cli build \
            --matched "matched_${{ steps.date.outputs.date }}.csv" \
            --static "../../../static_gtfs.zip" \
            --out-prefix "../../../lodz_realized_${{ steps.date.outputs.date }}" \
            | tee "../../../build_output.log"
          CORRECTED=$(grep '^Segments corrected:' "../../../build_output.log" | grep -oE '[0-9]+' || echo 0)
          echo "segments_corrected=${CORRECTED:-0}" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release (in this repo — never in easy-OTP)
        if: steps.existing_release.outputs.exists != 'true'
        run: |
          set -euo pipefail
          DATE="${{ steps.date.outputs.date }}"
          COUNT="${{ steps.collect.outputs.count }}"
          MATCHED="${{ steps.match.outputs.matched_count }}"
          CORRECTED="${{ steps.build.outputs.segments_corrected }}"
          COVERAGE="${{ steps.coverage.outputs.coverage }}"
          # Renamed (not uploaded as-is, and not via `gh release create`'s `path#label` syntax,
          # which only changes the displayed label, not the downloaded filename) so every day's
          # static feed downloads under a distinct, dated name instead of all colliding on the
          # generic local filename `static_gtfs.zip` once saved locally.
          cp static_gtfs.zip "lodz_static_gtfs_${DATE}.zip"
          gh release create "lodz-realized-${DATE}-phone" \
            "lodz_realized_${DATE}_p50.zip" "lodz_realized_${DATE}_p85.zip" \
            "lodz_static_gtfs_${DATE}.zip" \
            --title "Łódź — ${DATE} — realized GTFS (phone)" \
            --notes "Automated build from phone-recorded data (TX-2/TX-3). P50/P85 corrected GTFS from ${DATE}'s recording (${COUNT} recording director$( [ "${COUNT}" = "1" ] && echo y || echo ies ) merged, ${MATCHED} observations matched, ${CORRECTED} segments corrected). Actual recorded coverage: ${COVERAGE}. Static GTFS as downloaded and used for this day's match/build also attached, for comparison across days if the source agency's trip_id generation drifts (see FA-6). Source: GISBoost/easy-OTP tools/family_a_reconstruction."

      - name: Delete the phone's now-consumed raw-data release
        # Unlike FA-7 (whose raw artifacts self-expire via retention-days: 2), TX-3 uploads raw
        # recordings as a GitHub Release via plain curl (to avoid installing `gh` on the phone),
        # and Releases have no built-in expiration - left alone, one would accumulate per day
        # forever. Safe to delete only once the corrected GTFS this raw data feeds into has
        # actually been published (Publish already succeeded by this point in the job).
        # continue-on-error + non-fatal handling below: this is best-effort tidying, not core
        # functionality - a failure here must not mark the whole run as failed (which would both
        # send a misleading WhatsApp "FAILED" message for a build that actually succeeded, and -
        # since the idempotency guard would then see today's final release already exists on any
        # retry - permanently skip retrying the deletion too).
        if: success() && steps.existing_release.outputs.exists != 'true'
        continue-on-error: true
        run: |
          set -uo pipefail
          TAG="positions-raw-${{ steps.date.outputs.date }}"
          if gh release delete "$TAG" --yes --cleanup-tag; then
            echo "Deleted raw-data release ${TAG} (superseded by lodz-realized-${{ steps.date.outputs.date }}-phone)"
          else
            echo "::warning::Failed to delete raw-data release ${TAG} - not fatal, safe to clean up manually or leave for a later run"
          fi

      - name: Notify WhatsApp (success)
        if: success() && steps.existing_release.outputs.exists != 'true'
        run: |
          set -euo pipefail
          DATE="${{ steps.date.outputs.date }}"
          COUNT="${{ steps.collect.outputs.count }}"
          MATCHED="${{ steps.match.outputs.matched_count }}"
          CORRECTED="${{ steps.build.outputs.segments_corrected }}"
          COVERAGE="${{ steps.coverage.outputs.coverage }}"
          P50_URL="https://github.com/${{ github.repository }}/releases/download/lodz-realized-${DATE}-phone/lodz_realized_${DATE}_p50.zip"
          P85_URL="https://github.com/${{ github.repository }}/releases/download/lodz-realized-${DATE}-phone/lodz_realized_${DATE}_p85.zip"
          TEXT=$(printf 'Lodz GTFS-RT (%s) ready. Coverage: %s\n%s recording director%s merged, %s observations matched, %s segments corrected.\nP50: %s\nP85: %s' \
            "${DATE}" "${COVERAGE}" "${COUNT}" "$([ "${COUNT}" = "1" ] && echo y || echo ies)" \
            "${MATCHED}" "${CORRECTED}" \
            "${P50_URL}" "${P85_URL}")
          curl -sS -G "https://api.callmebot.com/whatsapp.php" \
            --data-urlencode "phone=${{ secrets.CALLMEBOT_PHONE }}" \
            --data-urlencode "apikey=${{ secrets.CALLMEBOT_APIKEY }}" \
            --data-urlencode "text=${TEXT}"

      - name: Notify WhatsApp (failure)
        if: failure()
        run: |
          set -euo pipefail
          TEXT="Lodz GTFS-RT (${{ steps.date.outputs.date }}) build FAILED - check Actions log: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -sS -G "https://api.callmebot.com/whatsapp.php" \
            --data-urlencode "phone=${{ secrets.CALLMEBOT_PHONE }}" \
            --data-urlencode "apikey=${{ secrets.CALLMEBOT_APIKEY }}" \
            --data-urlencode "text=${TEXT}"
