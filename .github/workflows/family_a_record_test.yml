name: Family A — record TEST (Łódź, 10 min, temporary)

# TEMPORARY smoke-test workflow — verifies the cross-repo checkout + record pipeline works
# end-to-end without waiting for a full ~4.5h chunk. Manual trigger only, no schedule.
# Delete this file once chunk1-4 have been confirmed working.
on:
  workflow_dispatch: {}

jobs:
  record:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout this repo (workflow + eventual artifact context)
        uses: actions/checkout@v4

      - name: Checkout easy-OTP (source of the family_a CLI, read-only)
        uses: actions/checkout@v4
        with:
          repository: GISBoost/easy-OTP
          path: easy-otp-src
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compute today's local (Europe/Warsaw) date
        id: date
        run: echo "date=$(TZ=Europe/Warsaw date +%F)" >> "$GITHUB_OUTPUT"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('easy-otp-src/tools/family_a_reconstruction/requirements.txt') }}

      - name: Install dependencies
        working-directory: easy-otp-src/tools/family_a_reconstruction
        run: pip install -r requirements.txt

      - name: Record test (10 min)
        working-directory: easy-otp-src/tools/family_a_reconstruction
        run: |
          python -m family_a.cli record \
            --url "${{ vars.LODZ_VEHICLE_POSITIONS_URL }}" \
            --out-dir "../../../positions_${{ steps.date.outputs.date }}_test" \
            --duration-min 10 \
            --interval-sec 60

      - name: Upload recorded snapshots as artifact
        uses: actions/upload-artifact@v4
        with:
          name: positions-${{ steps.date.outputs.date }}-test
          path: positions_${{ steps.date.outputs.date }}_test
          retention-days: 1
