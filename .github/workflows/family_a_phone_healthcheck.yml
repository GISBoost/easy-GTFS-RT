name: Family A — phone recording healthcheck

on:
  # Runs every 15 minutes, all day (mirrors sweep_and_upload.sh's own cadence, easy-OTP) instead
  # of a single fixed daily Europe/Warsaw check. A single fixed check time cannot safely cover
  # cities far from Warsaw's own offset: Boston (America/New_York, UTC-4 in July) doesn't close
  # its recording window until Warsaw-local ~04:00 the *next* day, so a 21:00 Warsaw check used to
  # find it "missing" and send a false alert every single night, even when nothing was wrong.
  # Each city is now gated independently on its OWN local clock (Gate 1 below, same shape as
  # sweep_and_upload.sh's) using the new `timezone` field in config/cities.json - falls back to
  # Europe/Warsaw when a city doesn't set one, same convention as the phone side. Bonus: unlike
  # the old fixed-hour cron, this needs no manual DST-flip twice a year either - see
  # fix/tx4-cron-dst-offset for the class of bug that used to require it.
  #
  # A city that's still missing keeps re-passing its own Gate 1 for the rest of the day - the
  # per-city-per-date `healthcheck-alert-<city>-<date>` marker release created below (Michał's
  # dedup concern) makes sure it's only ever alerted on once, not every 15 minutes all night.
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

concurrency:
  # Serializes overlapping runs (a delayed/queued scheduled tick landing close to the next one) -
  # without this, two runs could both pass the marker-release "not found" check for the same
  # city+date before either has created it (classic check-then-act race), sending a duplicate
  # WhatsApp alert. cancel-in-progress: false queues the second run instead of cancelling the
  # first, so both still complete correctly (the second just finds the marker already there).
  group: family-a-phone-healthcheck
  cancel-in-progress: false

jobs:
  healthcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write   # gh release view/create for the per-city dedup marker below
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout this repo (for config/cities.json)
        uses: actions/checkout@v4

      - name: Check each city, per its own local time, for a missing raw-recording release
        id: check
        run: |
          set -uo pipefail   # not -e: one city's gh api call failing must not abort the others

          # Mirrors sweep_and_upload.sh's own constants (easy-OTP) - kept as a separate literal
          # here for the same reason that file gives: small, self-contained duplication over a
          # shared source, matching this project's established convention.
          WINDOW_END_MIN=$(( 22 * 60 ))
          SAFETY_MARGIN_MIN=10

          NEWLY_MISSING=()

          for CITY in $(jq -r 'keys[]' config/cities.json); do
            ZONE="$(jq -r --arg c "$CITY" '.[$c].timezone // "Europe/Warsaw"' config/cities.json)"
            DATE="$(TZ="$ZONE" date +%F)"

            # Gate 1 (correctness, same shape as sweep_and_upload.sh's): don't judge a city
            # "missing" until its own local recording window has actually closed (+ margin) - see
            # this file's header comment for why a single fixed check time can't do this safely.
            # 10# forces base-10 - date +%H/%M zero-pads (e.g. "08"), which bash arithmetic would
            # otherwise parse as invalid octal.
            NOW_MIN_LOCAL=$(( 10#$(TZ="$ZONE" date +%H) * 60 + 10#$(TZ="$ZONE" date +%M) ))
            if [ "$NOW_MIN_LOCAL" -lt "$(( WINDOW_END_MIN + SAFETY_MARGIN_MIN ))" ]; then
              continue   # silent - not due yet, not worth logging every tick
            fi

            TAG="positions-raw-${CITY}-${DATE}"
            ASSET_COUNT="$(gh api "repos/${{ github.repository }}/releases/tags/${TAG}" --jq '.assets | length' 2>/dev/null || echo 0)"
            if [ "$ASSET_COUNT" -gt 0 ]; then
              continue   # present - nothing to do, self-correcting even if it was missing earlier
            fi

            # Dedup so a still-missing city isn't re-alerted every 15 minutes for the rest of the
            # night: same "check via `gh release view`, then create" idempotency idiom already
            # used elsewhere in this codebase (sweep_and_upload.sh's own release lookup, the build
            # workflow's idempotency guard) via a throwaway marker release. Only the tick that
            # actually finds no existing marker counts as first detection and gets alerted on; a
            # later re-check of a still-missing city just finds its own marker and stays silent.
            # No cleanup needed - the date changes daily, so nothing here ever goes stale.
            ALERT_TAG="healthcheck-alert-${CITY}-${DATE}"
            if gh release view "$ALERT_TAG" >/dev/null 2>err.log; then
              continue   # already alerted for this city+date
            elif ! grep -qi "not found" err.log; then
              echo "::warning::gh release view for marker ${ALERT_TAG} failed unexpectedly (not a plain 'not found') - alerting anyway this tick to be safe:"
              cat err.log >&2
            fi
            gh release create "$ALERT_TAG" \
              --notes "Internal healthcheck marker for ${CITY} ${DATE} - see family_a_phone_healthcheck.yml. Safe to delete manually." \
              >/dev/null 2>&1 || true
            NEWLY_MISSING+=("$CITY")
          done

          if [ "${#NEWLY_MISSING[@]}" -gt 0 ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            # Space-separated list, safe here since config/cities.json keys are plain city ids
            # (no spaces).
            echo "missing=${NEWLY_MISSING[*]}" >> "$GITHUB_OUTPUT"
          else
            echo "found=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Alert for newly-missing cities
        if: steps.check.outputs.found == 'false'
        run: |
          curl -sS -G "https://api.callmebot.com/whatsapp.php" \
            --data-urlencode "phone=${{ secrets.CALLMEBOT_PHONE }}" \
            --data-urlencode "apikey=${{ secrets.CALLMEBOT_APIKEY }}" \
            --data-urlencode "text=easy-GTFS-RT (phone): no raw recording found yet for: ${{ steps.check.outputs.missing }} - check the phone."
