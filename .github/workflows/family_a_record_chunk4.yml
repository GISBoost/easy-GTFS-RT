name: Family A — record chunk 4 (Łódź)

on:
  schedule:
    # Europe/Warsaw local window 18:00-22:00. Rest of the evening, low stakes — the
    # afternoon peak has already ended by the time this starts, and chunk 3 already
    # covers past 18:00 via its own 30-min overlap. CEST (summer, UTC+2) — current
    # offset as of 2026-07. CET (winter, UTC+1) equivalent: "0 17 * * *". DST is NOT
    # auto-compensated (no sleep-align step) — this cron must be edited by hand after
    # each DST switch (last Sunday of March/October). Deliberately out of scope for
    # FA-7 — see PR_easy-OTP_v07.md, section FA-7, "Ograniczenia", and this repo's
    # CLAUDE.md.
    - cron: "0 16 * * *"
  workflow_dispatch: {}

jobs:
  record:
    runs-on: ubuntu-latest
    # Safety margin under GitHub's own 360-minute (6h) hard cap per job.
    timeout-minutes: 340
    steps:
      - name: Checkout this repo (workflow + eventual artifact context)
        uses: actions/checkout@v4

      - name: Checkout easy-OTP (source of the family_a CLI, read-only)
        uses: actions/checkout@v4
        with:
          repository: GISBoost/easy-OTP
          path: easy-otp-src
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compute today's local (Europe/Warsaw) date
        id: date
        run: echo "date=$(TZ=Europe/Warsaw date +%F)" >> "$GITHUB_OUTPUT"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('easy-otp-src/tools/family_a_reconstruction/requirements.txt') }}

      - name: Install dependencies
        working-directory: easy-otp-src/tools/family_a_reconstruction
        run: pip install -r requirements.txt

      - name: Record chunk 4
        working-directory: easy-otp-src/tools/family_a_reconstruction
        run: |
          python -m family_a.cli record \
            --url "${{ vars.LODZ_VEHICLE_POSITIONS_URL }}" \
            --out-dir "../../../positions_${{ steps.date.outputs.date }}_chunk4" \
            --duration-min 240 \
            --interval-sec 60

      - name: Upload recorded snapshots as artifact
        uses: actions/upload-artifact@v4
        with:
          name: positions-${{ steps.date.outputs.date }}-chunk4
          path: positions_${{ steps.date.outputs.date }}_chunk4
          retention-days: 2
