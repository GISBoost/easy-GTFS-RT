name: Łódź — record chunk 1

on:
  schedule:
    # Europe/Warsaw local window 05:00-10:30, covers the morning peak (07:00-10:00) with
    # TWO hours of slack before it starts - widened from the original one-hour buffer
    # (06:00 start) on 2026-07-12, decision Michał, after this exact chunk's schedule
    # trigger was observed 2h31m late that morning (see the "0 4 * * *" -> 2h31m-late
    # incident referenced below) and actually left a ~90-minute hole in the recorded
    # morning peak (~07:00-08:31 uncovered - no other chunk overlaps that window). Two
    # hours of lead-in absorbs a repeat of that same delay almost entirely. Duration
    # extended from 270 to 330 min to keep the same 10:30 end (preserves the 30-min
    # overlap with chunk 2's own 10:00 start - unrelated to this change, don't shrink it).
    # This does NOT guarantee zero gap - GitHub's schedule trigger has no documented upper
    # bound on delay at any tier - it reduces the odds/size of a repeat, it doesn't
    # eliminate the underlying platform limitation.
    # Minute offset is deliberately NOT :00 - GitHub's own docs warn schedule triggers see
    # the worst congestion/delay at the top of the hour
    # ("High load times include the start of every hour... schedule your workflow to run at
    # a different time of the hour"), and this was confirmed directly on this repo: the old
    # "0 4 * * *" run on 2026-07-12 was created 2h31m late (04:00->06:31 UTC), with the
    # run->job-start gap itself only ~3s - i.e. 100% of the delay was GitHub's scheduler, not
    # runner queueing.
    # CEST (summer, UTC+2) — current offset as of 2026-07.
    # CET (winter, UTC+1) equivalent: "6 4 * * *". DST is NOT auto-compensated (no
    # sleep-align step) — this cron must be edited by hand after each DST switch (last
    # Sunday of March/October). Deliberately out of scope for FA-7 — see
    # PR_easy-OTP_v07.md, section FA-7, "Ograniczenia", and this repo's CLAUDE.md.
    - cron: "6 3 * * *"
  workflow_dispatch: {}

jobs:
  record:
    runs-on: ubuntu-latest
    # Tighter margin than the other chunks (only 30 min under the 6h hard cap, vs. 60-100
    # min elsewhere) - a direct consequence of extending duration-min to 330 to widen this
    # chunk's morning-peak buffer (see the `schedule:` comment above) while GitHub's 360-min
    # hard cap per job doesn't move. Still comfortable in absolute terms: checkout/setup/
    # cache/upload steps here are lightweight (low single-digit minutes total, warm cache).
    timeout-minutes: 355
    steps:
      - name: Checkout this repo (workflow + eventual artifact context)
        uses: actions/checkout@v4

      - name: Checkout easy-OTP (source of the family_a CLI, read-only)
        uses: actions/checkout@v4
        with:
          repository: GISBoost/easy-OTP
          path: easy-otp-src
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compute today's local (Europe/Warsaw) date
        id: date
        run: echo "date=$(TZ=Europe/Warsaw date +%F)" >> "$GITHUB_OUTPUT"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('easy-otp-src/tools/family_a_reconstruction/requirements.txt') }}

      - name: Install dependencies
        working-directory: easy-otp-src/tools/family_a_reconstruction
        run: pip install -r requirements.txt

      - name: Record chunk 1
        working-directory: easy-otp-src/tools/family_a_reconstruction
        run: |
          python -m family_a.cli record \
            --url "${{ vars.LODZ_VEHICLE_POSITIONS_URL }}" \
            --out-dir "../../../positions_${{ steps.date.outputs.date }}_chunk1" \
            --duration-min 330 \
            --interval-sec 60

      - name: Upload recorded snapshots as artifact
        uses: actions/upload-artifact@v4
        with:
          name: positions-${{ steps.date.outputs.date }}-chunk1
          path: positions_${{ steps.date.outputs.date }}_chunk1
          retention-days: 2
