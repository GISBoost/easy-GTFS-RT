name: Łódź — build

on:
  # Primary (and, as of the 2026-07-13 incident below, only automatic) trigger: fires the
  # moment chunk4's SCHEDULED run actually finishes, whatever real time that turns out to be -
  # eliminates the race against chunk4's own start-delay entirely, instead of guessing a fixed
  # buffer after its nominal end. Filtered to `event == 'schedule'` in the job-level `if:` below
  # so a manual/test run of chunk4 (workflow_dispatch) never auto-triggers a build with that
  # day's data still incomplete.
  #
  # A `schedule:` end-of-day fallback (23:45 CEST) used to sit here as a safety net for the rare
  # case chunk4 never completes at all. Removed on 2026-07-13 (Michał decision) after it caused
  # a spurious failure: GitHub's schedule queue delayed that run past local midnight, so
  # `TZ=Europe/Warsaw date +%F` resolved to the *next* day - a day whose chunks hadn't recorded
  # yet - and it failed on "no artifacts found" right after the workflow_run trigger had already
  # published that day's release successfully minutes earlier. The fallback routinely ran too
  # late to be useful anyway. `family_a_build_and_notify_on_demand.yml` (workflow_dispatch-only,
  # with a `date` override) now covers this case instead - run it by hand if workflow_run never
  # fires for a given day.
  workflow_run:
    workflows: ["Łódź — record chunk 4"]
    types: [completed]
  workflow_dispatch:
    inputs:
      date:
        description: >-
          Override RECORDING_DATE (YYYY-MM-DD) for a manual run — leave empty to use today's
          Europe/Warsaw date. Useful when testing after local midnight has rolled over past the
          day whose chunks you actually want to build.
        required: false
        default: ""

concurrency:
  # Serializes any same-time overlap between this workflow's own triggers (workflow_run and a
  # manual workflow_dispatch run) and the separate on-demand workflow, which shares this same
  # group - without this, two runs could both pass the idempotency guard's `gh release view`
  # check before either has created the release (classic check-then-act race), and the second
  # `gh release create` would fail on the now-existing tag with a spurious failure notification.
  # cancel-in-progress: false queues the second run instead of cancelling the first, so it still
  # completes and then correctly no-ops via the idempotency guard.
  group: family-a-build-and-notify
  cancel-in-progress: false

jobs:
  build_and_notify:
    # Only react to a workflow_run event when the chunk4 run it fired from was itself a
    # SCHEDULED run - a manual/test run of chunk4 must never auto-trigger this build with a
    # possibly-incomplete artifact set for the day. A workflow_dispatch trigger on this workflow
    # itself is always allowed through (no workflow_run context to check there).
    # Note: `types: [completed]` fires regardless of chunk4's conclusion (success/failure/
    # cancelled), intentionally - even a failed/partial chunk4 means "today's recording is as
    # done as it's going to get", and the artifact-prefix discovery below already tolerates
    # fewer directories than expected.
    if: github.event_name != 'workflow_run' || github.event.workflow_run.event == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write   # required for `gh release create` in this repo
      actions: read      # required for `gh api .../actions/artifacts` (list + download zip) —
                          # once any explicit `permissions:` block is present, unlisted scopes
                          # drop to `none`, so this must be listed even though it looks implicit
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Checkout easy-OTP (source of the family_a CLI, read-only)
        uses: actions/checkout@v4
        with:
          repository: GISBoost/easy-OTP
          path: easy-otp-src
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compute today's local (Europe/Warsaw) date
        id: date
        run: |
          OVERRIDE="${{ github.event.inputs.date }}"
          if [ -n "$OVERRIDE" ]; then
            echo "date=$OVERRIDE" >> "$GITHUB_OUTPUT"
          else
            echo "date=$(TZ=Europe/Warsaw date +%F)" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for an existing release (idempotency guard)
        id: existing_release
        run: |
          set -euo pipefail
          TAG="lodz-realized-${{ steps.date.outputs.date }}"
          if gh release view "$TAG" >/dev/null 2>err.log; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release $TAG already exists - this day was already built (likely by an earlier workflow_run trigger); skipping the rest of this run."
          elif grep -qi "not found" err.log; then
            echo "exists=false" >> "$GITHUB_OUTPUT"
          else
            # Anything other than a plain "not found" (auth, rate limit, transient API error) is
            # NOT safe to treat as "release doesn't exist" - doing so could still hit a
            # duplicate-tag conflict later in Publish if the release actually does exist. Fail
            # loudly here instead, so the real cause shows up in the log and triggers the
            # failure notification, rather than a confusing error several steps downstream.
            echo "::error::gh release view failed unexpectedly (not a plain \"not found\") - refusing to assume the release doesn't exist. Raw error follows:"
            cat err.log >&2
            exit 1
          fi

      - name: Cache pip dependencies
        if: steps.existing_release.outputs.exists != 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('easy-otp-src/tools/family_a_reconstruction/requirements.txt') }}

      - name: Install dependencies
        if: steps.existing_release.outputs.exists != 'true'
        working-directory: easy-otp-src/tools/family_a_reconstruction
        run: pip install -r requirements.txt

      - name: Download fresh static GTFS
        if: steps.existing_release.outputs.exists != 'true'
        run: curl -fsSL -o static_gtfs.zip "${{ vars.LODZ_STATIC_GTFS_URL }}"

      - name: Collect today's recording artifacts (by name prefix, not a fixed count)
        id: artifacts
        if: steps.existing_release.outputs.exists != 'true'
        run: |
          set -euo pipefail
          DATE="${{ steps.date.outputs.date }}"
          PREFIX="positions-${DATE}-"
          mkdir -p chunks

          # List every non-expired artifact whose name starts with today's prefix - this is
          # what makes the count dynamic: FA-7's default chunks (chunk1..chunk4) and any FA-9
          # on-demand extras (e.g. positions-<date>-custom) are all picked up the same way, with
          # zero assumption about how many there are or what their suffixes are called. The
          # artifacts-list endpoint has no server-side prefix filter, so this is a client-side
          # jq `startswith`. `gh api --jq` only accepts a single filter-expression argument (no
          # `--arg` support) - variable binding needs the standalone `jq` binary instead, piped
          # from raw --paginate output (multiple concatenated JSON page bodies, which jq's
          # default streaming input handles natively without --slurp).
          # De-duped by name (`sort -k2 -u` keeps exactly one row per distinct NAME - verified
          # empirically, GNU coreutils sort's -u suppresses on the specified key alone, not the
          # whole line - which id survives isn't guaranteed, but that's fine here) to guard
          # against a same-day manual re-run of a chunk workflow producing two artifacts that
          # share one name.
          mapfile -t MATCHES < <(gh api "repos/${{ github.repository }}/actions/artifacts" --paginate \
            | jq -r --arg prefix "$PREFIX" \
                '.artifacts[] | select(.expired == false) | select(.name | startswith($prefix)) | "\(.id) \(.name)"' \
            | sort -k2 -u)

          if [ "${#MATCHES[@]}" -eq 0 ]; then
            echo "::error::No artifacts found matching prefix '${PREFIX}' for ${DATE} - did FA-7's chunks run today?"
            exit 1
          fi

          DIRS=()
          for ENTRY in "${MATCHES[@]}"; do
            ID="${ENTRY%% *}"
            NAME="${ENTRY#* }"
            gh api "repos/${{ github.repository }}/actions/artifacts/${ID}/zip" > "${NAME}.zip"
            unzip -q "${NAME}.zip" -d "chunks/${NAME}"
            rm "${NAME}.zip"
            DIRS+=("chunks/${NAME}")
          done

          echo "count=${#DIRS[@]}" >> "$GITHUB_OUTPUT"
          # Space-separated list, consumed word-split by `match` below - safe here since our own
          # artifact names never contain spaces.
          echo "dirs=${DIRS[*]}" >> "$GITHUB_OUTPUT"
          echo "Found ${#DIRS[@]} recording director$( [ ${#DIRS[@]} -eq 1 ] && echo y || echo ies ) for ${DATE}: ${DIRS[*]}"

      - name: Compute actual recorded time coverage
        id: coverage
        if: steps.existing_release.outputs.exists != 'true'
        run: |
          set -euo pipefail
          python3 - ${{ steps.artifacts.outputs.dirs }} >> "$GITHUB_OUTPUT" <<'PYEOF'
          # Merges each chunk's actual (not nominal/scheduled) start/stop into contiguous
          # ranges, so a schedule-trigger delay (this repo has already seen delays over 2h -
          # see the record-chunk workflows' comments) shows up as a visible gap instead of
          # being silently assumed away by reporting only the intended cron windows.
          import json
          import sys
          from datetime import datetime
          from pathlib import Path
          from zoneinfo import ZoneInfo

          UTC = ZoneInfo("UTC")
          WARSAW = ZoneInfo("Europe/Warsaw")

          intervals = []
          for d in sys.argv[1:]:
              manifest = Path(d) / "recording.json"
              if not manifest.exists():
                  print(f"::warning::no recording.json in {d}, excluded from coverage summary", file=sys.stderr)
                  continue
              data = json.loads(manifest.read_text())
              # started_at/stopped_at are written by family_a's recorder.write_manifest() as
              # datetime.now() on the recording runner - naive, and NOT Europe/Warsaw: GitHub
              # -hosted runners default to UTC, and only the separate "compute today's date"
              # step in each chunk workflow sets TZ=Europe/Warsaw (scoped to that command only).
              start = datetime.fromisoformat(data["started_at"]).replace(tzinfo=UTC).astimezone(WARSAW)
              stop = datetime.fromisoformat(data["stopped_at"]).replace(tzinfo=UTC).astimezone(WARSAW)
              intervals.append((start, stop))

          intervals.sort()
          merged = []
          for start, stop in intervals:
              if merged and start <= merged[-1][1]:
                  merged[-1] = (merged[-1][0], max(merged[-1][1], stop))
              else:
                  merged.append((start, stop))

          ranges = ", ".join(f"{s:%H:%M}-{e:%H:%M}" for s, e in merged) if merged else "unknown"
          print(f"coverage={ranges}")
          PYEOF

      - name: Match
        id: match
        if: steps.existing_release.outputs.exists != 'true'
        working-directory: easy-otp-src/tools/family_a_reconstruction
        run: |
          set -euo pipefail
          args=()
          for d in ${{ steps.artifacts.outputs.dirs }}; do
            args+=(--positions-dir "../../../${d}")
          done
          python -m family_a.cli match \
            "${args[@]}" \
            --static "../../../static_gtfs.zip" \
            --out "matched_${{ steps.date.outputs.date }}.csv" \
            | tee "../../../match_output.log"

          # FA-8 spec requires a failure notification (not a silent "success") when match finds
          # zero observations - e.g. the static GTFS was republished mid-recording and every
          # trip_id now resolves as unknown_shape (see FA-6 README's "Recording across multiple
          # days" note). Without this check, `match`/`build` both exit 0 on an empty table and a
          # misleadingly cheerful "ready" message would still go out.
          MATCHED=$(grep '^Observations matched:' "../../../match_output.log" | grep -oE '[0-9]+' || echo 0)
          echo "matched_count=${MATCHED:-0}" >> "$GITHUB_OUTPUT"
          if [ "${MATCHED:-0}" -eq 0 ]; then
            echo "::error::match produced zero observations - matched.csv is effectively empty (check the reject-count breakdown above; a republished static GTFS with a shifted trip_id generation mid-recording is a known cause)"
            exit 1
          fi

      - name: Build
        id: build
        if: steps.existing_release.outputs.exists != 'true'
        working-directory: easy-otp-src/tools/family_a_reconstruction
        run: |
          set -euo pipefail
          python -m family_a.cli build \
            --matched "matched_${{ steps.date.outputs.date }}.csv" \
            --static "../../../static_gtfs.zip" \
            --out-prefix "../../../lodz_realized_${{ steps.date.outputs.date }}" \
            | tee "../../../build_output.log"
          CORRECTED=$(grep '^Segments corrected:' "../../../build_output.log" | grep -oE '[0-9]+' || echo 0)
          echo "segments_corrected=${CORRECTED:-0}" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release (in this repo — never in easy-OTP)
        if: steps.existing_release.outputs.exists != 'true'
        run: |
          set -euo pipefail
          DATE="${{ steps.date.outputs.date }}"
          COUNT="${{ steps.artifacts.outputs.count }}"
          MATCHED="${{ steps.match.outputs.matched_count }}"
          CORRECTED="${{ steps.build.outputs.segments_corrected }}"
          COVERAGE="${{ steps.coverage.outputs.coverage }}"
          # Renamed (not uploaded as-is, and not via `gh release create`'s `path#label` syntax,
          # which only changes the displayed label, not the downloaded filename) so every day's
          # static feed downloads under a distinct, dated name instead of all colliding on the
          # generic local filename `static_gtfs.zip` once saved locally.
          cp static_gtfs.zip "lodz_static_gtfs_${DATE}.zip"
          gh release create "lodz-realized-${DATE}" \
            "lodz_realized_${DATE}_p50.zip" "lodz_realized_${DATE}_p85.zip" \
            "lodz_static_gtfs_${DATE}.zip" \
            --title "Łódź — ${DATE} — realized GTFS" \
            --notes "Automated build. P50/P85 corrected GTFS from ${DATE}'s recording (${COUNT} recording director$( [ "${COUNT}" = "1" ] && echo y || echo ies ) merged, ${MATCHED} observations matched, ${CORRECTED} segments corrected). Actual recorded coverage: ${COVERAGE}. Static GTFS as downloaded and used for this day's match/build also attached, for comparison across days if the source agency's trip_id generation drifts (see FA-6). Source: GISBoost/easy-OTP tools/family_a_reconstruction."

      - name: Notify WhatsApp (success)
        if: success() && steps.existing_release.outputs.exists != 'true'
        run: |
          set -euo pipefail
          DATE="${{ steps.date.outputs.date }}"
          COUNT="${{ steps.artifacts.outputs.count }}"
          MATCHED="${{ steps.match.outputs.matched_count }}"
          CORRECTED="${{ steps.build.outputs.segments_corrected }}"
          COVERAGE="${{ steps.coverage.outputs.coverage }}"
          P50_URL="https://github.com/${{ github.repository }}/releases/download/lodz-realized-${DATE}/lodz_realized_${DATE}_p50.zip"
          P85_URL="https://github.com/${{ github.repository }}/releases/download/lodz-realized-${DATE}/lodz_realized_${DATE}_p85.zip"
          TEXT=$(printf 'Lodz GTFS-RT (%s) ready. Coverage: %s\n%s recording director%s merged, %s observations matched, %s segments corrected.\nP50: %s\nP85: %s' \
            "${DATE}" "${COVERAGE}" "${COUNT}" "$([ "${COUNT}" = "1" ] && echo y || echo ies)" \
            "${MATCHED}" "${CORRECTED}" \
            "${P50_URL}" "${P85_URL}")
          curl -sS -G "https://api.callmebot.com/whatsapp.php" \
            --data-urlencode "phone=${{ secrets.CALLMEBOT_PHONE }}" \
            --data-urlencode "apikey=${{ secrets.CALLMEBOT_APIKEY }}" \
            --data-urlencode "text=${TEXT}"

      - name: Notify WhatsApp (failure)
        if: failure()
        run: |
          set -euo pipefail
          TEXT="Lodz GTFS-RT (${{ steps.date.outputs.date }}) build FAILED - check Actions log: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -sS -G "https://api.callmebot.com/whatsapp.php" \
            --data-urlencode "phone=${{ secrets.CALLMEBOT_PHONE }}" \
            --data-urlencode "apikey=${{ secrets.CALLMEBOT_APIKEY }}" \
            --data-urlencode "text=${TEXT}"
